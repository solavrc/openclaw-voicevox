name: Publish ClawHub

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref, tag, branch, or commit SHA to publish
        required: true
        default: main
      dry_run:
        description: Preview only
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  dry-run:
    if: inputs.dry_run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm pack --dry-run --json
      - run: npm install -g clawhub@0.23.0
      - name: Resolve release metadata
        id: meta
        run: |
          version="$(node -p "require('./package.json').version")"
          commit="$(git rev-parse HEAD)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
      - name: Dry-run ClawHub publish
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ steps.meta.outputs.commit }}
        run: |
          clawhub package publish "solavrc/openclaw-voicevox@$COMMIT" \
            --family code-plugin \
            --owner solavrc \
            --name @solavrc/openclaw-voicevox \
            --version "$VERSION" \
            --source-repo solavrc/openclaw-voicevox \
            --source-commit "$COMMIT" \
            --dry-run \
            --json > clawhub-dry-run.json
          cat clawhub-dry-run.json
      - name: Verify dry-run result
        env:
          EXPECTED_PACKAGE_NAME: "@solavrc/openclaw-voicevox"
          EXPECTED_VERSION: ${{ steps.meta.outputs.version }}
          EXPECTED_COMMIT: ${{ steps.meta.outputs.commit }}
        run: node .tools-dist/scripts/assert-clawhub-publish-result.js clawhub-dry-run.json

  publish:
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    environment: clawhub-production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm pack --dry-run --json
      - run: npm install -g clawhub@0.23.0
      - name: Authenticate ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: clawhub login --token "$CLAWHUB_TOKEN" --label "GitHub Actions manual publish"
      - name: Resolve release metadata
        id: meta
        run: |
          version="$(node -p "require('./package.json').version")"
          commit="$(git rev-parse HEAD)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
      - name: Dry-run ClawHub publish
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ steps.meta.outputs.commit }}
        run: |
          clawhub package publish "solavrc/openclaw-voicevox@$COMMIT" \
            --family code-plugin \
            --owner solavrc \
            --name @solavrc/openclaw-voicevox \
            --version "$VERSION" \
            --source-repo solavrc/openclaw-voicevox \
            --source-commit "$COMMIT" \
            --dry-run \
            --json > clawhub-dry-run.json
          cat clawhub-dry-run.json
      - name: Verify dry-run result
        env:
          EXPECTED_PACKAGE_NAME: "@solavrc/openclaw-voicevox"
          EXPECTED_VERSION: ${{ steps.meta.outputs.version }}
          EXPECTED_COMMIT: ${{ steps.meta.outputs.commit }}
        run: node .tools-dist/scripts/assert-clawhub-publish-result.js clawhub-dry-run.json
      - name: Publish to ClawHub
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ steps.meta.outputs.commit }}
        run: |
          clawhub package publish "solavrc/openclaw-voicevox@$COMMIT" \
            --family code-plugin \
            --owner solavrc \
            --name @solavrc/openclaw-voicevox \
            --version "$VERSION" \
            --source-repo solavrc/openclaw-voicevox \
            --source-commit "$COMMIT" \
            --json > clawhub-publish.json
          cat clawhub-publish.json
      - name: Verify publish result
        env:
          EXPECTED_PACKAGE_NAME: "@solavrc/openclaw-voicevox"
          EXPECTED_VERSION: ${{ steps.meta.outputs.version }}
          EXPECTED_COMMIT: ${{ steps.meta.outputs.commit }}
        run: node .tools-dist/scripts/assert-clawhub-publish-result.js clawhub-publish.json
