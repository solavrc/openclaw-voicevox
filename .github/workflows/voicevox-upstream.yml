name: VOICEVOX Upstream Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  detect-voice-drift:
    runs-on: ubuntu-latest
    env:
      VOICEVOX_ENGINE_IMAGE: voicevox/voicevox_engine:cpu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Start VOICEVOX Engine
        run: |
          docker run -d --name voicevox-engine -p 127.0.0.1:50021:50021 "$VOICEVOX_ENGINE_IMAGE"
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:50021/version; then
              exit 0
            fi
            sleep 2
          done
          docker logs voicevox-engine
          exit 1
      - name: Compare upstream speakers
        id: upstream
        run: |
          set +e
          npm run check:upstream > voicevox-upstream-report.md 2>&1
          status=$?
          cat voicevox-upstream-report.md
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Create review issue
        if: steps.upstream.outputs.status != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "VOICEVOX upstream voice changes detected";
            const managedLabel = "voicevox-upstream";
            const labels = [managedLabel, "needs-review"];
            const report = fs.readFileSync("voicevox-upstream-report.md", "utf8").trim();
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              "VOICEVOX Engine `/speakers` no longer matches the reviewed snapshot.",
              "",
              `Workflow run: ${runUrl}`,
              "",
              "Review checklist:",
              "- Confirm VOICEVOX official terms and the relevant voice library terms.",
              "- Decide whether each new or changed style should receive a friendly alias.",
              "- Update `data/voices.json` only for accepted aliases.",
              "- Run `npm run sync:voices`.",
              "- Refresh `data/voicevox-upstream-speakers.snapshot.json` with `npm run check:upstream -- --update`.",
              "- Run `npm run check`.",
              "",
              "Report:",
              "",
              "```text",
              report,
              "```",
            ].join("\n");

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: label === managedLabel ? "5319e7" : "fbca04",
                });
              }
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: managedLabel,
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              core.notice(`Updated existing issue #${existing.number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels,
              });
              core.notice(`Created issue #${issue.number}`);
            }
      - name: Fail on upstream voice drift
        if: steps.upstream.outputs.status != '0'
        run: exit 1
